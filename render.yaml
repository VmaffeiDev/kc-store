databases:
  - name: kc-store-db
    plan: basic-256mb
    region: virginia
    databaseName: kc_store
    user: kc_store

services:
  - type: web
    name: kc-store-web
    runtime: node
    plan: starter
    region: virginia
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run prisma:migrate && npm run prisma:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: kc-store-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: OWNER_NAME
        value: Administracao K&C STORE
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_STATEMENT_DESCRIPTOR
        value: KC STORE
      - key: MELHOR_ENVIO_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: worker
    name: kc-store-worker
    runtime: node
    plan: starter
    region: virginia
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: kc-store-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
